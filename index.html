<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusBound - Attention Controlled Learning</title>
    <style>
      body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
      #app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
      #game-container { border: 2px solid #444; border-radius: 8px; overflow: hidden; position: relative; }
      #ui-layer { position: absolute; top: 10px; left: 10px; pointer-events: none; }
      #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
      .hidden { display: none !important; }
      button { padding: 10px 20px; font-size: 1.2rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
      #focus-meter { width: 200px; height: 20px; background: #333; border-radius: 10px; margin-top: 10px; overflow: hidden; }
      #focus-bar { width: 0%; height: 100%; background: #4caf50; transition: width 0.3s; }
      canvas#analytics-chart { max-width: 800px; max-height: 400px; background: white; border-radius: 8px; margin-top: 20px; }
    </style>
  </head>
  <body>
    <div id="overlay">
      <h1>FocusBound</h1>
      <p>The game only moves when you focus. Stay alert!</p>
      <button id="start-btn">Start Game</button>
      <div id="loading" class="hidden">Loading Tracking Models...</div>
    </div>

    <div id="dashboard" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; overflow-y: auto; padding: 20px; text-align: center;">
      <h1>Session Summary</h1>
      <div id="final-score">Focus Score: 0%</div>
      <canvas id="analytics-chart"></canvas>
      <br><br>
      <button onclick="location.reload()">Try Again</button>
    </div>

    <div id="app">
      <div id="ui-layer">
        <div>Focus Level: <span id="focus-val">0%</span></div>
        <div id="focus-meter"><div id="focus-bar"></div></div>
      </div>
      <div id="game-container"></div>
      <video id="webcam" style="position: absolute; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 1px solid white; transform: scaleX(-1);" autoplay playsinline></video>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
